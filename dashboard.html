<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Cloud Airlines — Dashboard</title>
  <link rel="icon" href="logo.png" type="image/icon type">
  <link rel="stylesheet" href="styles.css">
  
  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1500.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
</head>
<body>
  <header>
    <a class="brand" href="dashboard.html">
      <span class="logo"><img src="logo.png" alt="Cloud Airlines logo"></span>
      <div>
        <h1>Cloud Airlines</h1>
        <div class="small muted">Employee Policy Portal</div>
      </div>
    </a>

    <div class="nav-right">
      <div id="user-email" class="muted"></div>
      <button id="logout-btn" class="btn-ghost">Sign out</button>
    </div>
  </header>

  <main>
    <div class="layout dashboard-layout">
      <aside class="sidebar" aria-label="Departments">
        <div style="font-weight:700;margin-bottom:8px">Departments</div>
        <nav id="dept-list" class="tree" aria-label="department list"></nav>
        <a id="update-btn" class="file update-btn" href="#">Update</a>
        <a id="update-btn" class="file update-btn" href="https://github.com/Requena4416/Cloud-Airlines" target="_blank" rel="noopener">GitHub</a>
        <!-- The Update button and Github button do diff things, but didn't want to change ids and class--->
      </aside>

      <section class="content">
        <div class="content-header">
          <div class="breadcrumbs">Home / <strong id="current-dept">Overview</strong></div>
          <form id="search-form" class="search-form" role="search" aria-label="Search policies">
            <input id="search-input" type="search" placeholder="Search policies..." aria-label="Search policies">
          </form>
        </div>

        <div id="dashboard-area">
          <div id="search-results" class="search-results" hidden aria-live="polite"></div>

          <div id="folders" class="folders"></div>

          <div id="documents" class="doc-list" hidden></div>
        </div>
      </section>
    </div>
  </main>

  <div id="update-modal" class="modal" aria-hidden="true" role="dialog" aria-labelledby="update-modal-title">
    <div class="modal-backdrop" id="update-modal-backdrop"></div>
    <div class="modal-panel" role="document">
      <h3 id="update-modal-title">Request Policy Update</h3>
      <form id="update-form">
        <label for="update-dept">Department</label>
        <select id="update-dept" required>
            <option value="hr">Human Resources</option>
            <option value="reservations">Reservations</option>
            <option value="sales">Sales</option>
        </select>

        <label for="update-doc">Document</label>
        <select id="update-doc" required>
            <option value="general">General Inquiry</option>
            <option value="policy-change">Policy Revision</option>
        </select>

        <label for="update-comment">Comment / Description</label>
        <textarea id="update-comment" rows="4" placeholder="Describe the requested change..." required></textarea>

        <div class="modal-actions">
          <button type="button" id="update-cancel" class="btn-ghost">Cancel</button>
          <button type="submit" class="btn-primary">Submit Request</button>
        </div>
      </form>
    </div>
  </div>

  <footer>
    <div class="small">© <span id="year">2026</span> Cloud Airlines</div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
