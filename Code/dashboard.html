<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Cloud Airlines — Dashboard</title>
  <link rel="icon" href="logo.png" type="image/icon type">
  <link rel="stylesheet" href="styles.css">
  <script src="https://sdk.amazonaws.com/js/aws-sdk-2.1500.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/amazon-cognito-identity-js@6.3.7/dist/amazon-cognito-identity.min.js"></script>
</head>
<body style="background-image: url('cloud.png'); background-size: cover; background-attachment: fixed;">
  <header style="background: rgba(255,255,255,0.9); padding: 10px 20px; display: flex; justify-content: space-between; align-items: center;">
      <div class="brand"><strong>Cloud Airlines</strong> | Portal</div>
      <div class="nav-right">
          <span id="user-email" style="margin-right: 15px; font-size: 0.8em;"></span>
          <button class="btn-action" onclick="localStorage.clear(); location.href='index.html'">Sign Out</button>
      </div>
  </header>

  <main style="display: flex; padding: 20px; gap: 20px;">
    <aside class="sidebar" style="background: white; padding: 20px; border-radius: 8px; width: 250px;">
        <h3>Departments</h3>
        <nav id="dept-list"></nav>
        <hr style="margin: 20px 0;">
        <button class="btn-action" onclick="document.getElementById('update-modal').style.display = 'flex'">Update Request</button>
        <a class="btn-action" href="https://github.com/Requena4416/Cloud-Airlines" target="_blank">GitHub</a>
    </aside>

    <section class="content" style="flex: 1; background: rgba(255,255,255,0.95); padding: 30px; border-radius: 8px;">
        <div class="breadcrumbs">Home / <span id="current-dept">Overview</span></div>
        <div id="folders" class="folders"></div>
        <div id="documents" class="doc-list" hidden></div>
    </section>
  </main>

  <div id="update-modal" style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center;">
      <div style="background: white; padding: 30px; border-radius: 12px; width: 400px;">
          <h3>Policy Update Request</h3>
          <form id="update-form">
              <select id="update-dept" style="width:100%; margin-bottom: 10px;"><option value="hr">Human Resources</option><option value="rev">Reservations</option><option value="sales">Sales</option></select>
              <textarea id="update-comment" placeholder="Details..." style="width:100%; height: 100px;"></textarea>
              <button type="submit">Submit</button>
              <button type="button" onclick="document.getElementById('update-modal').style.display = 'none'">Cancel</button>
          </form>
      </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
