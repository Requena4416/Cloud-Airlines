<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Cloud Airlines</title>
     <link rel="icon" href="logo.png" type="image/icon type">
    <meta name="description" content="Cloud Airlines — Book flights, manage trips, check flight status." />
    <!doctype html>
    <html lang="en">
      <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Cloud Airlines — Employee Login</title>
        <link rel="stylesheet" href="styles.css">
      </head>
      <body>
        <header>
          <a class="brand" href="/">
            <span class="logo"><img src="logo.png" alt="Cloud Airlines logo"></span>
            <div>
              <h1>Cloud Airlines</h1>
              <div class="small muted">Employee Policy Portal</div>
            </div>
          </a>
        </header>

        <main class="centered">
          <section class="card login-card" aria-labelledby="login-title">
            <h2 id="login-title">Employee sign in</h2>
            <p class="muted">Sign in with your corporate email. (This is a static demo — no real authentication yet.)</p>

            <form id="login-form" novalidate>
              <label for="email">Email</label>
              <input id="email" name="email" type="email" placeholder="you@cloudairlines.com" required>

              <label for="password">Password</label>
              <input id="password" name="password" type="password" placeholder="Your password" required>

              <div id="login-error" class="error" role="alert" aria-live="assertive" hidden></div>

              <button type="submit" class="btn-primary">Sign in</button>
            </form>

            <div class="help muted">
              Demo credentials: <strong>demo@cloudairlines.com / Password123</strong>
            </div>
          </section>
        </main>

        <footer>
          <div class="small">Cloud Airlines · Internal Use Only</div>
        </footer>

        <script src="app.js"></script>
      </body>
    </html>
